<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rail Fence Cipher</title>
</head>
<body>
    <h1>Rail Fence Cipher</h1>

    <h2>Encrypt</h2>
    <form method="post">
        <input type="hidden" name="action" value="encrypt">
        <label>Plain text:</label>
        <input type="text" name="plain_text" value="{{ plain_text }}">
        <label>Key (rails):</label>
        <input type="number" name="key" value="{{ key }}">
        <button type="submit">Encrypt</button>
    </form>
    <p>{{ encrypted_text }}</p>

    <h2>Decrypt</h2>
    <form method="post">
        <input type="hidden" name="action" value="decrypt">
        <label>Cipher text:</label>
        <input type="text" name="cipher_text" value="{{ cipher_text }}">
        <label>Key (rails):</label>
        <input type="number" name="key" value="{{ key }}">
        <button type="submit">Decrypt</button>
    </form>
    <p>{{ decrypted_text }}</p>

    <p><a href="/">Back</a></p>
</body>
</html>
